<div class="mb-4 h2 text-success">ثبت نام</div>
<form [formGroup]="form" (ngSubmit)="onSubmit()" >
  <div class="mb-3">
    <label for="full-name" class="form-label">نام و نام خانوادگی</label>
    <input formControlName="fullName" type="text" class="form-control bg-body-secondary" id="full-name" >
  </div>
  <div class="mb-3">
    <label for="email" class="form-label">ایمیل</label>
    <input formControlName="email" type="email" class="form-control bg-body-secondary" id="email" >
  </div>
  <div class="mb-3">
    <label for="password" class="form-label">رمز</label>
    <input  formControlName="password" type="password" class="form-control bg-body-secondary" id="password">
  </div>
  <div class="mb-3">
    <label  for="confirm-password" class="form-label">تکرار رمز</label>
    <input formControlName="confirmPassword" type="password" class="form-control bg-body-secondary" id="confirm-password">
  </div>
  <button type="submit" class="btn btn-success w-100 rounded-3 mt-4">ارسال</button>
</form>
